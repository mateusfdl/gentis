log:
  level: debug
  format: json
metrics:
  enabled: false
engine:
  shards: 8
  fanout_threshold: 50000
  fanout_workers: 8
  history_size: 128
  history_ttl: 5m
gc:
  pacer: true
  mem_limit: 1073741824
  spike_gogc: 300
  normal_gogc: 150
auth:
  hmac_secret: topsecret
websocket:
  addr: 0.0.0.0:9080
  read_limit: 131072
  write_timeout: 20s
  send_buffer: 512
server:
  addr: 0.0.0.0:9100
  metrics_addr: :9090
  debug_addr: :6060
  arena: true
  max_sessions: 4096
  ping_interval: 15s
  auth_deadline: 45s
  tls:
    cert: /etc/gentis/tls.crt
    key: /etc/gentis/tls.key
  max_message_size: 131072
  max_subscriptions: 32
relay:
  addr: 0.0.0.0:9200
  upstream:
    addr: upstream:9000
    auth_token: relaytoken
    tls: true
    ca: /etc/gentis/ca.pem
  metrics_addr: :9091
  reconnect:
    initial: 200ms
    max: 1m
    multiplier: 3.0
    max_retries: 5
  buffer_size: 512
  incoming_buffer: 8192
  fanout_workers: 16
  arena: true
  max_sessions: 8192
  ping_interval: 10s
  auth_deadline: 60s
  tls:
    cert: /etc/gentis/relay.crt
    key: /etc/gentis/relay.key
  max_message_size: 262144
  max_subscriptions: 64
strict: true
default:
  history_size: 16
namespaces:
  chat:
    history_size: 256
    history_ttl: 10m
    max_subscribers: 5000
