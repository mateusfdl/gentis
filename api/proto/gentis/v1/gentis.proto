syntax = "proto3";

package gentis.v1;

option go_package = "github.com/mateusfdl/gentis/api/gen/gentis/v1;gentisv1";

// GentisService provides pub/sub functionality over a bidirectional stream.
service GentisService {
  // Stream establishes a bidirectional streaming connection for all pub/sub operations.
  rpc Stream(stream ClientMessage) returns (stream ServerMessage);
}

// ClientMessage wraps all possible client-to-server messages.
message ClientMessage {
  // Optional correlation ID; echoed back in the response.
  string id = 10;

  oneof message {
    ConnectRequest connect = 1;
    SubscribeRequest subscribe = 2;
    UnsubscribeRequest unsubscribe = 3;
    PublishRequest publish = 4;
    PingRequest ping = 5;
    RefreshRequest refresh = 6;
    ConfirmRequest confirm = 7;
  }
}

// ServerMessage wraps all possible server-to-client messages.
message ServerMessage {
  // Echoed from the client request that triggered this response.
  // Empty for server-initiated messages (e.g. channel deliveries).
  string id = 10;

  oneof message {
    ConnectedResponse connected = 1;
    SubscribedResponse subscribed = 2;
    UnsubscribedResponse unsubscribed = 3;
    ChannelMessage channel_message = 4;
    PongResponse pong = 5;
    ErrorResponse error = 6;
    PublishResponse published = 7;
    RefreshResponse refreshed = 8;
  }
}

// ConnectRequest authenticates the client.
message ConnectRequest {
  string auth_token = 1;
}

// ConnectedResponse confirms successful authentication.
message ConnectedResponse {
  string connection_id = 1;
}

// RefreshRequest renews the session credentials before they expire.
message RefreshRequest {
  string auth_token = 1;
}

// RefreshResponse confirms credential renewal.
message RefreshResponse {
  // Unix seconds at which the renewed credentials expire. Zero means the
  // session never expires.
  uint64 expires_at = 1;
}

// SubscribeRequest requests subscription to a channel. Setting recover asks
// the server to replay publications missed since the given position.
// Setting max_unconfirmed opts the subscription into at-least-once
// delivery with a credit window (the channel's namespace must allow it).
message SubscribeRequest {
  string channel = 1;
  RecoverPoint recover = 2;
  UnconfirmedWindow max_unconfirmed = 3;
}

// UnconfirmedWindow is the consumer's advertised credit: how many
// deliveries (and bytes) may be in flight unconfirmed before the server
// stops sending. Zero count means a server-chosen default.
message UnconfirmedWindow {
  uint32 count = 1;
  uint64 bytes = 2;
}

// ConfirmRequest acknowledges deliveries cumulatively: confirming offset N
// confirms every delivery up to and including N on the channel.
message ConfirmRequest {
  string channel = 1;
  uint64 offset = 2;
}

// RecoverPoint is the last position a client saw on a channel.
message RecoverPoint {
  uint64 offset = 1;
  uint64 epoch = 2;
}

// SubscribedResponse confirms subscription. When recovery was requested,
// recovered tells whether the gap was replayed exactly; false means the
// client must resync its state from scratch.
message SubscribedResponse {
  string channel = 1;
  bool recovered = 2;
}

// UnsubscribeRequest requests unsubscription from a channel.
message UnsubscribeRequest {
  string channel = 1;
}

// UnsubscribedResponse confirms unsubscription.
message UnsubscribedResponse {
  string channel = 1;
}

// PublishRequest publishes a message to a channel.
message PublishRequest {
  string channel = 1;
  bytes data = 2;
}

// PublishResponse acknowledges a publish with its assigned identity
// and fanout outcome.
message PublishResponse {
  string channel = 1;
  // Per-channel monotonic position assigned to this publication.
  uint64 offset = 2;
  // Number of subscribers the message was delivered to.
  uint32 delivered = 3;
  // Number of subscribers whose send buffer was full.
  uint32 dropped = 4;
  // Channel incarnation the offset belongs to.
  uint64 epoch = 5;
}

// ChannelMessage delivers a published message to subscribers.
message ChannelMessage {
  string channel = 1;
  bytes data = 2;
  // Per-channel monotonic position of this publication.
  uint64 offset = 3;
  // Channel incarnation; offsets are only comparable within one epoch.
  uint64 epoch = 4;
}

// PingRequest is a keep-alive ping.
message PingRequest {}

// PongResponse is a keep-alive pong.
message PongResponse {}

// ErrorResponse reports an error.
message ErrorResponse {
  ErrorCode code = 1;
  string message = 2;
}

// ErrorCode enumerates error types.
enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_UNKNOWN_MESSAGE = 1;
  ERROR_CODE_INVALID_PAYLOAD = 2;
  ERROR_CODE_NOT_AUTHENTICATED = 3;
  ERROR_CODE_CHANNEL_NOT_FOUND = 4;
  ERROR_CODE_ALREADY_SUBSCRIBED = 5;
  ERROR_CODE_NOT_SUBSCRIBED = 6;
  ERROR_CODE_INTERNAL = 7;
  ERROR_CODE_MESSAGE_TOO_LARGE = 8;
  ERROR_CODE_SUBSCRIPTION_LIMIT = 9;
  ERROR_CODE_PERMISSION_DENIED = 10;
  ERROR_CODE_RATE_LIMITED = 11;
}
