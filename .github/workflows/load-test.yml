name: Load Test

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      test_type:
        description: "Test type"
        required: true
        default: "pubsub"
        type: choice
        options:
          - smoke
          - pubsub
          - stress
          - soak
          - spike
      transport:
        description: "Transport"
        required: true
        default: "grpc"
        type: choice
        options:
          - grpc
          - ws
      target:
        description: "Target"
        required: true
        default: "server"
        type: choice
        options:
          - server
          - relay
      vus:
        description: "Virtual Users (pubsub steady-state)"
        required: true
        default: "100"
      duration:
        description: "Duration in seconds (pubsub steady-state)"
        required: true
        default: "60"

jobs:
  load-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ hashFiles('**/go.sum') }}
          restore-keys: go-

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Build gentis binary
        run: CGO_ENABLED=0 go build -o gentis ./cmd/gentis

      - name: Start infrastructure
        run: docker compose --profile gentis up -d

      - name: Wait for healthy services
        run: |
          echo "Waiting for server and relay to be healthy..."
          for i in $(seq 1 30); do
            HEALTHY=$(docker compose ps --format json | jq -r 'select(.Health == "healthy") | .Name' | wc -l)
            if [ "$HEALTHY" -ge 2 ]; then
              echo "Services are healthy ($HEALTHY/2)"
              break
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done

      - name: Verify Prometheus targets
        run: |
          for i in $(seq 1 10); do
            TARGETS=$(curl -sf http://localhost:9090/api/v1/targets | jq '.data.activeTargets | map(select(.health == "up")) | length')
            if [ "$TARGETS" -ge 1 ]; then
              echo "Prometheus has $TARGETS healthy targets"
              break
            fi
            echo "Waiting for Prometheus targets... ($i/10)"
            sleep 5
          done

      - name: Run smoke tests
        working-directory: ./test
        run: |
          k6 run -e TARGET=${{ inputs.target }} k6/smoke_test.js
          k6 run k6/ws_smoke_test.js

      - name: Collect baseline metrics
        run: |
          echo "=== Baseline Metrics ===" | tee baseline_metrics.txt
          for metric in gentis_messages_published_total gentis_messages_delivered_total gentis_messages_dropped_total gentis_connections_active; do
            RESULT=$(curl -sf "http://localhost:9090/api/v1/query?query=sum(${metric})" | jq -r '.data.result[0].value[1] // "0"')
            echo "${metric}: ${RESULT}" | tee -a baseline_metrics.txt
          done

      - name: Run load test
        working-directory: ./test
        env:
          TRANSPORT: ${{ inputs.transport }}
          TEST_TYPE: ${{ inputs.test_type }}
        run: |
          TEST_TYPE="${TEST_TYPE:-pubsub}"
          if [ "$TRANSPORT" = "ws" ]; then
            SCRIPT="k6/ws_${TEST_TYPE}_test.js"
          else
            SCRIPT="k6/${TEST_TYPE}_test.js"
          fi
          echo "Running ${SCRIPT}"
          k6 run \
            -e TARGET=${{ inputs.target }} \
            -e STEADY_VUS=${{ inputs.vus || '100' }} \
            -e STEADY_DURATION=${{ inputs.duration || '60' }} \
            "$SCRIPT"

      - name: Collect final metrics
        run: |
          echo "=== Final Metrics ===" | tee final_metrics.txt
          for metric in gentis_messages_published_total gentis_messages_delivered_total gentis_messages_dropped_total gentis_connections_active; do
            RESULT=$(curl -sf "http://localhost:9090/api/v1/query?query=sum(${metric})" | jq -r '.data.result[0].value[1] // "0"')
            echo "${metric}: ${RESULT}" | tee -a final_metrics.txt
          done

      - name: Analyze metrics
        run: |
          echo "=== Metrics Analysis ==="

          DROP_RATE=$(curl -sf 'http://localhost:9090/api/v1/query?query=(sum(gentis_messages_dropped_total)%2Fsum(gentis_messages_published_total))*100' | jq -r '.data.result[0].value[1] // "0"')
          echo "Message Drop Rate: ${DROP_RATE}%"

          DELIVERY_RATE=$(curl -sf 'http://localhost:9090/api/v1/query?query=(sum(gentis_messages_delivered_total)%2Fsum(gentis_messages_published_total))*100' | jq -r '.data.result[0].value[1] // "0"')
          echo "Message Delivery Rate: ${DELIVERY_RATE}%"

          CONNECTIONS=$(curl -sf 'http://localhost:9090/api/v1/query?query=sum(gentis_connections_active)' | jq -r '.data.result[0].value[1] // "0"')
          echo "Active Connections: ${CONNECTIONS}"

          if (( $(echo "$DROP_RATE > 5" | bc -l) )); then
            echo "::warning::Drop rate is above 5% (${DROP_RATE}%)"
          fi

      - name: Collect container stats
        if: always()
        run: |
          echo "=== Container Stats ===" >> "$GITHUB_STEP_SUMMARY"
          docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.NetIO}}" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-results
          path: |
            baseline_metrics.txt
            final_metrics.txt

      - name: Collect logs
        if: always()
        run: docker compose --profile gentis logs --no-color server relay prometheus > logs.txt 2>&1 || true

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gentis-logs
          path: logs.txt

      - name: Cleanup
        if: always()
        run: docker compose --profile gentis down -v

  benchmark:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ hashFiles('**/go.sum') }}
          restore-keys: go-

      - name: Run Go benchmarks
        run: go test -bench=. -benchmem -count=3 -timeout=30m ./... | tee benchmark_results.txt

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Build gentis binary
        run: CGO_ENABLED=0 go build -o gentis ./cmd/gentis

      - name: Start infrastructure
        run: docker compose --profile gentis up -d

      - name: Wait for healthy services
        run: |
          for i in $(seq 1 30); do
            HEALTHY=$(docker compose ps --format json | jq -r 'select(.Health == "healthy") | .Name' | wc -l)
            if [ "$HEALTHY" -ge 2 ]; then
              break
            fi
            sleep 2
          done

      - name: Run k6 benchmark suite
        working-directory: ./test
        run: |
          for test in smoke pubsub stress; do
            echo "=== Running gRPC ${test} test ===" | tee -a benchmark_k6_results.txt
            k6 run "k6/${test}_test.js" 2>&1 | tee -a benchmark_k6_results.txt
            echo "" >> benchmark_k6_results.txt
          done
          for test in ws_smoke ws_pubsub ws_stress; do
            echo "=== Running ${test} ===" | tee -a benchmark_k6_results.txt
            k6 run "k6/${test}_test.js" 2>&1 | tee -a benchmark_k6_results.txt
            echo "" >> benchmark_k6_results.txt
          done

      - name: Collect metrics
        run: |
          echo "=== Benchmark Metrics ===" | tee benchmark_metrics.txt
          for metric in gentis_messages_published_total gentis_messages_delivered_total gentis_messages_dropped_total gentis_connections_active; do
            RESULT=$(curl -sf "http://localhost:9090/api/v1/query?query=sum(${metric})" | jq -r '.data.result[0].value[1] // "0"')
            echo "${metric}: ${RESULT}" | tee -a benchmark_metrics.txt
          done

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark_results.txt
            test/benchmark_k6_results.txt
            benchmark_metrics.txt

      - name: Cleanup
        if: always()
        run: docker compose --profile gentis down -v
