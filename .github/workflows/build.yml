name: Build

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ hashFiles('**/go.sum') }}
          restore-keys: go-

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build \
            -a \
            -ldflags="-s -w -extldflags '-static' -X main.version=${{ github.event.release.tag_name }} -X main.commit=$(git rev-parse --short HEAD)" \
            -trimpath \
            -tags netgo \
            -o gentis-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/gentis

      - name: Generate checksum
        run: sha256sum gentis-${{ matrix.goos }}-${{ matrix.goarch }} > gentis-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            gentis-${{ matrix.goos }}-${{ matrix.goarch }} \
            gentis-${{ matrix.goos }}-${{ matrix.goarch }}.sha256
