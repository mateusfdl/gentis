log:
  format: json
auth:
  disabled: true
server:
  addr: 0.0.0.0:9000
  metrics_addr: :8080
websocket:
  addr: 0.0.0.0:9080
strict: false
default:
  allow_publish: true
namespaces:
  jobs:
    allow_publish: true
    history_size: 64
    history_ttl: 5m
    qos: at-least-once
    redelivery_timeout: 2s
    max_redeliveries: 3
