global:
  scrape_interval: 2s
  evaluation_interval: 2s

scrape_configs:
  - job_name: "gentis-server"
    scrape_interval: 2s
    static_configs:
      - targets: ["gentis-server:8080"]

  - job_name: "gentis-relay"
    scrape_interval: 2s
    static_configs:
      - targets: ["gentis-relay:8081"]
