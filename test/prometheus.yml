global:
  scrape_interval: 2s
  evaluation_interval: 2s

scrape_configs:
  # server and relay run as docker-compose services on the gentis network
  # (profile=gentis); internal DNS reaches them by service name. Both targets
  # are DOWN until the gentis profile is up.
  - job_name: "server"
    scrape_interval: 2s
    static_configs:
      - targets: ["server:8080"]

  - job_name: "relay"
    scrape_interval: 2s
    static_configs:
      - targets: ["relay:8081"]
