global:
  scrape_interval: 2s
  evaluation_interval: 2s

scrape_configs:
  - job_name: "gentis-server"
    scrape_interval: 2s
    static_configs:
      - targets: ["host.docker.internal:8080"]

  - job_name: "gentis-relay"
    scrape_interval: 2s
    static_configs:
      - targets: ["host.docker.internal:8081"]
