services:
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./test/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.min-block-duration=2m"
      - "--query.lookback-delta=30s"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - gentis

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_LIVE_MAX_CONNECTIONS=100
      - GF_LIVE_ALLOWED_ORIGINS=*
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=100ms
    volumes:
      - ./test/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./test/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - gentis

networks:
  gentis:
    driver: bridge
