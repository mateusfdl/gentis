services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
      - "8080:8080"
    command: ["serve", "-addr", "0.0.0.0:9000", "-metrics-addr", "0.0.0.0:8080", "-metrics", "true"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512m
    healthcheck:
      test: ["CMD", "/gentis", "health", "-addr", "http://localhost:8080"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - gentis

  relay:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9001:9001"
      - "8081:8081"
    command: ["relay", "-addr", "0.0.0.0:9001", "-upstream", "server:9000", "-metrics-addr", "0.0.0.0:8081", "-metrics", "true"]
    depends_on:
      server:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    healthcheck:
      test: ["CMD", "/gentis", "health", "-addr", "http://localhost:8081"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - gentis

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./test/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.min-block-duration=2m"
      - "--query.lookback-delta=30s"
    depends_on:
      - server
      - relay
    networks:
      - gentis

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_LIVE_MAX_CONNECTIONS=100
      - GF_LIVE_ALLOWED_ORIGINS=*
      - GF_DASHBOARDS_MIN_REFRESH_INTERVAL=100ms
    volumes:
      - ./test/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./test/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - gentis

networks:
  gentis:
    driver: bridge
